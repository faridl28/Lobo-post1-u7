<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <!-- El título cambia dinámicamente: "Crear Producto" o "Editar Producto" -->
    <title th:text="${accion} + ' Producto'">Producto</title>
    <style>
        body     { font-family: Arial, sans-serif; margin: 2rem; }
        h1       { color: #C62828; }
        label    { display: block; margin-top: 1rem; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px;
                          box-sizing: border-box; margin-top: 4px; }
        .btn        { padding: 8px 16px; margin-top: 1rem; cursor: pointer; }
        .btn-save   { background: #C62828; color: white;
                      border: none; border-radius: 4px; }
        .btn-cancel { background: #808080; color: white;
                      text-decoration: none; border-radius: 4px; padding: 9px 16px; }
    </style>
</head>
<body>
    <h1 th:text="${accion} + ' Producto'">Producto</h1>

    <!--
        th:action → URL destino del POST
        th:object → objeto Producto que Spring enlaza con @ModelAttribute
        method="post" → envía los datos de forma segura
    -->
    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

        <!-- Campo oculto: preserva el ID en edición (null en creación) -->
        <input type="hidden" th:field="*{id}">

        <label for="nombre">Nombre:</label>
        <input type="text" th:field="*{nombre}" id="nombre" required
               placeholder="Ej: Laptop Gaming">

        <label for="descripcion">Descripción:</label>
        <textarea th:field="*{descripcion}" id="descripcion" rows="3"
                  placeholder="Breve descripción del producto"></textarea>

        <label for="precio">Precio ($):</label>
        <input type="number" th:field="*{precio}" id="precio"
               step="0.01" min="0" required placeholder="0.00">

        <br>
        <!-- El texto del botón cambia según la acción: "Crear Producto" o "Editar Producto" -->
        <button type="submit" class="btn btn-save"
                th:text="${accion} + ' Producto'">Guardar</button>
        <a th:href="@{/productos}" class="btn btn-cancel">Cancelar</a>
    </form>
</body>
</html>
